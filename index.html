<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Weather Chile App</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <link rel="stylesheet" href="assets/css/main.css" />
    </head>

    <body class="weather-app">
        <header class="weather-app__header">
            <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
                <div class="container">
                    <a class="navbar-brand fw-bold" href="index.html">
                        Weather Chile
                    </a>

                    <button
                        class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarNav"
                    >
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item">
                                <a class="nav-link active" href="index.html">
                                    Home
                                </a>
                            </li>

                            <li class="nav-item">
                                <a class="nav-link" href="about.html">
                                    Acerca de
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <main class="weather-app__content container py-5">
            <section class="text-center mb-5">
                <h1 class="weather-app__title display-3">Clima en Chile</h1>

                <p class="weather-app__subtitle">
                    Pronóstico climático de distintas ciudades del país
                </p>
            </section>

            <section>
                <div class="row" id="cities-container"></div>
            </section>
        </main>

        <footer class="weather-app__footer text-center py-4">
            <p class="mb-1">Proyecto Frontend Clima - 2026</p>

            <p class="mb-0">
                Desarrollado con HTML5, Bootstrap 5, SASS y JavaScript
            </p>
        </footer>

        <script src="assets/js/app.js"></script>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
